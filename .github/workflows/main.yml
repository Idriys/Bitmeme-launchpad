name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build - Windows
        if: matrix.os == 'windows-latest'
        run: |
          npm run build-win
          npm run build-portable
          npm run build-msi
        shell: bash

      - name: Build - macOS
        if: matrix.os == 'macos-latest'
        run: npm run build-mac
        shell: bash

      - name: Build - Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run build-linux
        shell: bash

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            electron/dist/*.exe
            electron/dist/*.dmg
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: warn
          retention-days: 1

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java (required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Run Android prebuild
        working-directory: mobile
        run: npm run prebuild-android

      - name: Make build script executable
        run: chmod +x mobile/scripts/build-android.sh

      - name: Build Android APK
        working-directory: mobile
        run: ./scripts/build-android.sh release

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: artifacts/desktop
          merge-multiple: true

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: List downloaded artifacts (for debugging)
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release and upload all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bitmeme ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/desktop/*.exe
            artifacts/desktop/*.dmg
            artifacts/desktop/*.AppImage
            artifacts/desktop/*.deb
            artifacts/android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
