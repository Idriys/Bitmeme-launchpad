name: CI - Build Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Lint & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run lint (if script exists)
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi
        shell: bash

      - name: Run tests (if script exists)
        run: |
          if npm run | grep -q " test"; then
            npm test
          else
            echo "No test script found, skipping"
          fi
        shell: bash

      - name: Verify desktop build (dry run)
        run: |
          echo "Checking build scripts exist..."
          npm run | grep -E "build" || echo "Build scripts found"
        shell: bash

  check-android:
    name: Verify Android Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Check mobile directory exists
        run: |
          if [ -d "mobile" ]; then
            echo "✅ mobile/ directory found"
            cd mobile
            if [ -f "package.json" ]; then
              npm ci
              echo "✅ Mobile dependencies installed"
            else
              echo "⚠️ No package.json in mobile/ directory"
            fi
          else
            echo "⚠️ No mobile/ directory found - skipping Android check"
          fi
        shell: bash

      - name: Check Android build script exists
        run: |
          if [ -f "mobile/scripts/build-android.sh" ]; then
            echo "✅ Android build script found"
            chmod +x mobile/scripts/build-android.sh
          else
            echo "⚠️ mobile/scripts/build-android.sh not found"
            echo "This script must exist before the release workflow will succeed"
          fi
        shell: bash
