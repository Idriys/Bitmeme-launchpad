<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bitcoinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB81C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements (Meme Coins) -->
  <circle cx="30" cy="30" r="12" fill="#FFB81C" opacity="0.7"/>
  <circle cx="170" cy="40" r="10" fill="#A0D8FF" opacity="0.6"/>
  <circle cx="25" cy="170" r="11" fill="#FFD700" opacity="0.65"/>
  <circle cx="175" cy="160" r="9" fill="#FF6B9D" opacity="0.6"/>
  
  <!-- Main Bitcoin Symbol Styled -->
  <g transform="translate(100, 100)">
    <!-- Outer Circle -->
    <circle cx="0" cy="0" r="65" fill="url(#bitcoinGradient)" opacity="0.95"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
    
    <!-- Inner Circle -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Bitcoin B Symbol -->
    <g transform="translate(-25, -35)">
      <!-- Vertical Line -->
      <line x1="0" y1="0" x2="0" y2="70" stroke="white" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Top Curve -->
      <path d="M 0 10 Q 25 10 25 25 Q 25 35 0 35" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Bottom Curve -->
      <path d="M 0 35 Q 25 35 25 50 Q 25 60 0 60" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Left Horizontal Line (Top) -->
      <line x1="-8" y1="15" x2="12" y2="15" stroke="white" stroke-width="6" stroke-linecap="round"/>
      
      <!-- Left Horizontal Line (Bottom) -->
      <line x1="-8" y1="45" x2="12" y2="45" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </g>
    
    <!-- Meme Elements (Smiling face integrated) -->
    <!-- Left Eye -->
    <circle cx="-18" cy="-8" r="4" fill="white" opacity="0.8"/>
    <!-- Right Eye -->
    <circle cx="18" cy="-8" r="4" fill="white" opacity="0.8"/>
    <!-- Smile Arc -->
    <path d="M -15 5 Q 0 15 15 5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Stars around (meme aesthetic) -->
    <g opacity="0.7">
      <text x="-50" y="-40" font-size="20" fill="white" font-weight="bold">★</text>
      <text x="45" y="-35" font-size="18" fill="white" font-weight="bold">✨</text>
      <text x="-55" y="45" font-size="16" fill="white" font-weight="bold">💰</text>
      <text x="50" y="50" font-size="18" fill="white" font-weight="bold">🚀</text>
    </g>
  </g>
  
  <!-- Bottom Text -->
  <text x="100" y="180" font-size="16" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">BITMEME</text>
</svg>
